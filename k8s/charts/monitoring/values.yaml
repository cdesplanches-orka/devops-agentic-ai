# Monitoring stack: Prometheus + Grafana
# Didactic setup for DevOps Agentic AI - node-exporter disabled for Docker Desktop compatibility

kube-prometheus-stack:
  # Disable node-exporter (CrashLoopBackOff on Docker Desktop / single-node)
  nodeExporter:
    enabled: false

  # Grafana: accessible at http://localhost/grafana
  grafana:
    adminPassword: admin
    ingress:
      enabled: true
      ingressClassName: nginx
      hosts:
        - localhost
      path: /grafana
      pathType: Prefix
    grafana.ini:
      server:
        domain: localhost
        root_url: "%(protocol)s://%(domain)s:%(http_port)s/grafana/"
        serve_from_sub_path: true

  # Prometheus: keep default config, reduce retention for dev
  prometheus:
    prometheusSpec:
      retention: 7d
      storageSpec:
        volumeClaimTemplate:
          spec:
            resources:
              requests:
                storage: 5Gi
