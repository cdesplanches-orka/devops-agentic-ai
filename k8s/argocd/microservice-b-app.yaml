apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: microservice-b
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/cdesplanches-orka/devops-agentic-ai.git
    targetRevision: master
    path: k8s/charts/ms-b
    helm:
      releaseName: microservice-b
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
